<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - XanaHealth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
      :root {
        --teal:       #5a9c8e;
        --teal-dark:  #4a8c7e;
        --teal-light: rgba(90,156,142,0.12);
        --navy:       #2c3e50;
        --muted:      #6b7280;
        --border:     #e5e7eb;
        --danger:     #dc3545;
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'DM Sans', sans-serif;
        height: 100vh;
        overflow: hidden;
        background: #f8faf9;
      }

      /* ── Layout ── */
      .login-wrapper {
        display: flex;
        flex-direction: row-reverse;
        height: 100vh;
      }

      /* ── Form panel ── */
      .form-panel {
        width: 42%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 60px 56px;
        background: #fff;
        position: relative;
        z-index: 1;
      }

      /* ── Brand ── */
      .brand {
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        letter-spacing: -0.5px;
        margin-bottom: 2.5rem;
        text-align: center;
      }
      .brand .xana  { color: var(--teal);  font-weight: 500; }
      .brand .hlth  { color: var(--navy);  font-weight: 400; }

      /* ── Headings ── */
      .form-panel h2 {
        font-size: 1.45rem;
        font-weight: 600;
        color: var(--navy);
        margin-bottom: .25rem;
      }
      .form-panel .subtitle {
        font-size: .9rem;
        color: var(--muted);
        margin-bottom: 1.75rem;
      }

      /* ── Inputs ── */
      .form-label {
        font-size: .82rem;
        font-weight: 500;
        color: var(--navy);
        margin-bottom: .4rem;
      }

      .form-control,
      .form-select {
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: .72rem 1rem;
        font-size: .9rem;
        font-family: 'DM Sans', sans-serif;
        transition: border-color .25s, box-shadow .25s;
        background-color: #fdfdfd;
      }
      .form-control:focus,
      .form-select:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3.5px var(--teal-light);
        outline: none;
        background-color: #fff;
      }

      /* ── Password toggle ── */
      .input-group .form-control {
        border-right: none;
        border-radius: 10px 0 0 10px !important;
      }
      .input-group .btn-eye {
        border: 1.5px solid var(--border);
        border-left: none;
        border-radius: 0 10px 10px 0;
        background: #fdfdfd;
        padding: 0 .9rem;
        color: var(--muted);
        transition: color .2s, border-color .2s;
        display: flex;
        align-items: center;
      }
      .input-group:focus-within .btn-eye {
        border-color: var(--teal);
        color: var(--teal);
      }
      .btn-eye:hover { color: var(--teal); }
      .btn-eye svg { width: 18px; height: 18px; }

      /* ── Submit ── */
      .btn-login {
        width: 100%;
        padding: .85rem;
        background: var(--teal);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 500;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: background .25s, transform .1s;
        margin-top: .5rem;
        position: relative;
      }
      .btn-login:hover:not(:disabled) { background: var(--teal-dark); }
      .btn-login:active:not(:disabled) { transform: scale(.98); }
      .btn-login:disabled { background: #b0c9c4; cursor: not-allowed; }

      /* spinner inside button */
      .btn-login .spinner-border {
        width: 1.1rem;
        height: 1.1rem;
        border-width: 2px;
      }

      /* ── Error alert ── */
      .alert-login {
        font-size: .85rem;
        border-radius: 8px;
        padding: .75rem 1rem;
        display: none;
        margin-bottom: 1rem;
      }
      .alert-login.show { display: flex; align-items: center; gap: .5rem; }

      /* ── Forgot ── */
      .forgot-link {
        display: block;
        text-align: center;
        margin-top: 1rem;
        font-size: .85rem;
        color: var(--teal);
        text-decoration: none;
        transition: color .2s;
      }
      .forgot-link:hover { color: var(--teal-dark); text-decoration: underline; }

      /* ── Image panel ── */
      .image-panel {
        width: 58%;
        background-image: url("images/stethoscope.jpg");
        background-size: cover;
        background-position: center;
        position: relative;
        overflow: hidden;
      }
      .image-panel::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(44,62,80,.55) 0%, rgba(90,156,142,.4) 100%);
      }
      .image-caption {
        position: absolute;
        bottom: 56px;
        left: 56px;
        right: 56px;
        color: #fff;
        z-index: 1;
      }
      .image-caption h1 {
        font-family: 'Playfair Display', serif;
        font-size: 2.6rem;
        font-weight: 400;
        line-height: 1.2;
        margin-bottom: .75rem;
      }
      .image-caption p {
        font-size: 1rem;
        opacity: .85;
        max-width: 380px;
        line-height: 1.6;
      }

      /* ── Mobile ── */
      @media (max-width: 768px) {
        body { overflow: auto; }
        .image-panel { display: none; }
        .form-panel { width: 100%; padding: 40px 28px; }
        .login-wrapper { height: auto; min-height: 100vh; }
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">

      <!-- ── Form side ── -->
      <div class="form-panel">
        <div class="brand"><span class="xana">Xana</span><span class="hlth">Health</span></div>

        <h2>Welcome</h2>
        <p class="subtitle">Sign in to continue</p>

        <!-- Error -->
        <div id="errorMsg" class="alert alert-danger alert-login" role="alert">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
            <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
          </svg>
          <span id="errorText"></span>
        </div>

        <form id="loginForm" novalidate>

          <!-- Username -->
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" class="form-control"
              placeholder="Enter your username" autocomplete="username"/>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <input type="password" id="password" class="form-control"
                placeholder="Enter your password" autocomplete="current-password"/>
              <button type="button" class="btn-eye" id="togglePassword" aria-label="Toggle password visibility">
                <!-- eye icon -->
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Role -->
          <div class="mb-4">
            <label for="facilityType" class="form-label">
              Role <span style="color:var(--danger);font-size:.75rem;">*</span>
            </label>
            <select id="facilityType" class="form-select" required>
              <option value="">Select your role</option>
              <option value="reception">Reception</option>
              <option value="admin">Admin</option>
              <option value="lab">Laboratory</option>
              <option value="consultation">Consultation</option>
              <option value="pharmacy">Pharmacy</option>
            </select>
          </div>

          <button type="submit" class="btn-login" id="loginBtn">
            <span class="btn-text">Sign In</span>
          </button>

          <a href="#" class="forgot-link" id="forgotPassword">Forgot Password?</a>
        </form>
      </div>

      <!-- ── Image side ── -->
      <div class="image-panel">
        <div class="image-caption">
          <h1>Compassionate care, seamlessly managed.</h1>
          <p>One platform to coordinate every part of your health facility — from reception to pharmacy.</p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const loginForm    = document.getElementById("loginForm");
      const loginBtn     = document.getElementById("loginBtn");
      const errorMsg     = document.getElementById("errorMsg");
      const errorText    = document.getElementById("errorText");
      const togglePwd    = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const eyeIcon      = document.getElementById("eyeIcon");

      /* ── Eye icon: show / hide password ── */
      const eyeOpen = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>`;
      const eyeSlash = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;

      togglePwd.addEventListener("click", () => {
        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";
        eyeIcon.innerHTML  = isHidden ? eyeSlash : eyeOpen;
      });

      /* ── Error helper ── */
      function showError(msg) {
        errorText.textContent = msg;
        errorMsg.classList.add("show");
        setTimeout(() => errorMsg.classList.remove("show"), 5000);
      }

      /* ── Login ── */
      loginForm.addEventListener("submit", function (e) {
        e.preventDefault();
        errorMsg.classList.remove("show");

        const role = document.getElementById("facilityType").value;

        if (!role) {
          showError("Please select your role to continue.");
          return;
        }

        // Loading state
        loginBtn.disabled = true;
        loginBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status"></span>Signing in…`;

        setTimeout(() => {
          loginBtn.disabled = false;
          loginBtn.innerHTML = `<span class="btn-text">Sign In</span>`;

          // Build a session object (username is cosmetic only)
          const username = document.getElementById("username").value.trim() || role;
          const user = { username, role };
          localStorage.setItem("xanaUser", JSON.stringify(user));

          // Redirect
          const routes = {
            reception:    "reception.html",
            admin:        "admin_dashboard.html",
            lab:          "laboratory.html",
            consultation: "consultation.html",
            pharmacy:     "pharmacy.html",
          };
          window.location.href = routes[role] || "index.html";
        }, 800);
      });

      /* ── Forgot password ── */
      document.getElementById("forgotPassword").addEventListener("click", e => {
        e.preventDefault();
        alert("Please contact your administrator to reset your password.");
      });

      /* ── Global logout (callable from other pages) ── */
      function logout() {
        localStorage.removeItem("xanaUser");
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
